server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: fim_server
    static_configs:
      - targets:
          - localhost
        labels:
          job: fim_logs
          __path__: /var/log/fim/*.log

    # This pipeline parses the JSON logs from our Go server
    # so Loki can index the fields like hostname, action, etc.
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            hostname: hostname
            os: os
            action: action
            file_path: file_path
            hash: hash
      
      # We promote the 'action' and 'hostname' to become indexable Loki labels
      # This allows Grafana to say: "Show me all FILE_CREATE events on Agent-1"
      - labels:
          action:
          hostname:
