agent:
  id: auto

server:
  address: localhost:9000
  tls: false

watch:
  paths:
    - ./test-watch #change this (for now its for testing)
  recursive: true

events:
  include:
    - FILE_CREATE
    - FILE_MODIFY
    - FILE_DELETE
    - CHANGE_PERMISSION
    - CHANGE_OWNERSHIP

scan:
  on_reconnect: true